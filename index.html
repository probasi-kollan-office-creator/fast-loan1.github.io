<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Gaming Spin & Win</title>
    <style>
        /* প্রফেশনাল কালারফুল গেমিং থিম */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #0d1117; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 20px 0;
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 25px; 
            background: linear-gradient(90deg, #00f2fe, #4facfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        /* স্পিন হুইল ডিজাইন */
        .wheel-box { position: relative; width: 300px; height: 300px; margin: 0 auto; border: 10px solid #161b22; border-radius: 50%; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .wheel { width: 100%; height: 100%; border-radius: 50%; position: relative; overflow: hidden; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); background: #161b22; }
        .segment { position: absolute; width: 50%; height: 50%; transform-origin: bottom right; display: flex; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .segment span { position: absolute; transform: rotate(45deg); font-weight: bold; font-size: 14px; color: #fff; left: 20px; top: 20px; }
        .pointer { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 45px; height: 45px; background: #ff0055; clip-path: polygon(50% 100%, 0 0, 100% 0); z-index: 20; filter: drop-shadow(0 0 10px #ff0055); }

        /* বাটন স্টাইল */
        .btn { margin-top: 35px; padding: 18px 45px; font-size: 20px; background: linear-gradient(45deg, #ff0055, #ffcc00); color: #fff; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.3s; box-shadow: 0 8px 25px rgba(255, 0, 85, 0.3); }
        .btn:disabled { background: #444; color: #777; box-shadow: none; cursor: not-allowed; }

        /* কার্ড ডিজাইন - ব্যালেন্স সহ */
        .wallet-card { 
            background: linear-gradient(135deg, #6e45e2, #88d3ce); /* ভায়োলেট গ্রেডিয়েন্ট */
            padding: 25px; 
            border-radius: 20px; 
            text-align: left; 
            margin-bottom: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            color: #fff;
            position: relative;
        }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-chip { width: 45px; height: 32px; background: linear-gradient(135deg, #ffd700, #b8860b); border-radius: 6px; margin: 15px 0; }
        .card-number-display { font-size: 20px; letter-spacing: 3px; font-family: 'Courier New', monospace; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        
        .card-balance-info { margin-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 10px; }
        .card-balance-info label { font-size: 10px; text-transform: uppercase; color: rgba(255,255,255,0.8); }
        .card-balance-info h3 { font-size: 24px; color: #fff; }

        /* উইথড্রো ফরম */
        .withdraw-section { background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
        .input-group input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid rgba(255, 255, 255, 0.1); background: #161b22; color: #fff; outline: none; }
        .input-group input:focus { border-color: #00f2fe; box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }
        
        .save-btn { background: linear-gradient(45deg, #22c55e, #16a34a); color: #fff; padding: 15px; width: 100%; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3); }

        .hidden { display: none; }
    </style>
</head>
<body>

    <audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="winSound" src="https://www.soundjay.com/misc/sounds/success-fanfare-trumpets-10.mp3"></audio>

    <div id="game-page" class="container">
        <h1>LUCKY SPIN</h1>
        <div class="wheel-box">
            <div class="pointer"></div>
            <div id="wheel" class="wheel">
                <div class="segment" style="transform: rotate(0deg); background: #ff0055;"><span>$0</span></div>
                <div class="segment" style="transform: rotate(30deg); background: #00f2fe;"><span>$10</span></div>
                <div class="segment" style="transform: rotate(60deg); background: #2ecc71;"><span>$50</span></div>
                <div class="segment" style="transform: rotate(90deg); background: #ffcc00;"><span>$5</span></div>
                <div class="segment" style="transform: rotate(120deg); background: #9b59b6;"><span>$20</span></div>
                <div class="segment" style="transform: rotate(150deg); background: #ff7700;"><span>$0</span></div>
                <div class="segment" style="transform: rotate(180deg); background: #1abc9c;"><span>$100</span></div>
                <div class="segment" style="transform: rotate(210deg); background: #34495e;"><span>$2</span></div>
                <div class="segment" style="transform: rotate(240deg); background: #e056fd;"><span>$15</span></div>
                <div class="segment" style="transform: rotate(270deg); background: #ff0055;"><span>$50</span></div>
                <div class="segment" style="transform: rotate(300deg); background: #2ecc71;"><span>$5</span></div>
                <div class="segment" style="transform: rotate(330deg); background: #00f2fe;"><span>$0</span></div>
            </div>
        </div>
        <button id="spinBtn" class="btn" onclick="playGame()">SPIN NOW</button>
        <p id="status" style="margin-top: 25px; font-weight: bold; min-height: 40px;"></p>
    </div>

    <div id="wallet-page" class="container hidden">
        <h1 style="color:#00f2fe; margin-bottom: 20px;">MY WALLET</h1>
        
        <div class="wallet-card">
            <div class="card-header">
                <span style="font-weight: bold; font-size: 20px; letter-spacing: 2px;">VISA</span>
                <span style="font-size: 10px; opacity: 0.8;">PREPAID CARD</span>
            </div>
            <div class="card-chip"></div>
            <div class="card-number-display">**** **** **** 1122</div>
            
            <div class="card-balance-info">
                <label>Available Balance</label>
                <h3 id="card-balance">$0.00</h3>
            </div>
        </div>

        <form class="withdraw-section" onsubmit="event.preventDefault(); saveWithdraw();">
            <h3 style="color:#ffcc00; text-align:center; margin-bottom:15px;">WITHDRAW METHOD</h3>
            
            <div class="input-group">
                <label>কার্ড নম্বর</label>
                <input type="text" id="cardNum" autocomplete="cc-number" placeholder="1234 5678 9012 3456" required>
            </div>
            
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 2;">
                    <label>মেয়াদ (MM/YY)</label>
                    <input type="text" id="cardExp" autocomplete="cc-exp" placeholder="MM/YY" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>CVV</label>
                    <input type="password" id="cardCvv" autocomplete="cc-csc" placeholder="***" required>
                </div>
            </div>
            
            <button type="submit" class="save-btn">SAVE & WITHDRAW</button>
        </form>
    </div>

    <script>
        let spinStep = 0;
        const spinSound = document.getElementById('spinSound');
        const winSound = document.getElementById('winSound');

        function playGame() {
            spinStep++;
            document.getElementById('spinBtn').disabled = true;
            spinSound.play();

            if (spinStep === 1) {
                document.getElementById('wheel').style.transform = "rotate(1800deg)";
                setTimeout(() => {
                    spinSound.pause();
                    document.getElementById('status').innerHTML = "দুঃখিত! আপনি $0 পেয়েছেন। <br><b>আরেকবার চেষ্টা করুন!</b>";
                    document.getElementById('spinBtn').disabled = false;
                }, 5100);
            } else if (spinStep === 2) {
                document.getElementById('wheel').style.transform = "rotate(3900deg)";
                setTimeout(() => {
                    spinSound.pause();
                    winSound.play();
                    document.getElementById('status').innerHTML = "<span style='color:#2ecc71;'>অভিনন্দন! আপনি $50.00 জিতেছেন!</span>";
                    document.getElementById('spinBtn').innerText = "CLAIM REWARD";
                    document.getElementById('spinBtn').disabled = false;
                    document.getElementById('spinBtn').onclick = () => {
                        winSound.pause();
                        document.getElementById('game-page').style.display = 'none';
                        document.getElementById('wallet-page').classList.remove('hidden');
                        animateBalance();
                    };
                }, 5100);
            }
        }

        function animateBalance() {
            let b = 0;
            let int = setInterval(() => {
                if(b >= 50) clearInterval(int);
                document.getElementById('card-balance').innerText = "$" + b.toFixed(2);
                b++;
            }, 40);
        }

        function saveWithdraw() {
            const num = document.getElementById('cardNum').value;
            if(num.length < 10) {
                alert("দয়া করে সঠিক কার্ড নম্বর দিন।");
            } else {
                alert("আপনার কার্ডটি সফলভাবে সেভ হয়েছে। উইথড্রো প্রসেসিং চলছে...");
                // এখানে আপনি টেলিগ্রামের কোড যোগ করতে পারেন।
            }
        }
    </script>
</body>
</html>
