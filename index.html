<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Reward Wallet</title>
    <style>
        /* ডিজাইন অংশ */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background: #0f172a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; text-align: center; }
        
        .container { width: 90%; max-width: 400px; position: relative; }
        
        /* স্পিন হুইল */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 30px auto; }
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 8px solid #334155; position: relative; 
            overflow: hidden; transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); 
        }
        .segment { 
            position: absolute; width: 50%; height: 50%; 
            background: var(--color); transform-origin: bottom right; 
            transform: rotate(calc(60deg * var(--i))); 
            display: flex; justify-content: center; align-items: center; 
            border: 1px solid rgba(0,0,0,0.1); 
        }
        .segment span { transform: rotate(-45deg); font-weight: bold; font-size: 14px; }
        .arrow { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; 
            border-right: 15px solid transparent; border-top: 25px solid #ef4444; z-index: 10; 
        }

        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            background: #3b82f6; color: #fff; border: none; 
            border-radius: 12px; margin-top: 20px; font-weight: bold; 
        }

        /* কার্ড ডিজাইন */
        .card-front {
            background: linear-gradient(135deg, #1e293b 0%, #000000 100%);
            border-radius: 20px; padding: 25px; text-align: left;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }
        .chip { width: 45px; height: 32px; background: #fbbf24; border-radius: 6px; margin: 20px 0; }
        .card-number { font-size: 18px; letter-spacing: 3px; font-family: monospace; color: #e2e8f0; }
        .balance-box { background: #1e293b; padding: 20px; border-radius: 15px; margin-top: 25px; border: 1px solid #334155; }
        .balance-box h2 { color: #22c55e; font-size: 32px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="game-page" class="container">
        <h1>আপনার রিওয়ার্ড গ্রহণ করুন</h1>
        <div class="wheel-container">
            <div id="wheel" class="wheel">
                <div class="segment" style="--i:1;--color:#ef4444;"><span>$0</span></div>
                <div class="segment" style="--i:2;--color:#3b82f6;"><span>$10</span></div>
                <div class="segment" style="--i:3;--color:#10b981;"><span>$50</span></div>
                <div class="segment" style="--i:4;--color:#f59e0b;"><span>$5</span></div>
                <div class="segment" style="--i:5;--color:#8b5cf6;"><span>$0</span></div>
                <div class="segment" style="--i:6;--color:#f97316;"><span>$100</span></div>
            </div>
            <div class="arrow"></div>
        </div>
        <button id="spinBtn" onclick="startSpin()">স্পিন করুন</button>
        <p id="msg" style="margin-top:15px;"></p>
    </div>

    <div id="wallet-page" class="container hidden">
        <h1>অভিনন্দন!</h1>
        <div class="card-front">
            <div style="display:flex; justify-content:space-between;">
                <span style="font-size:10px; color:#94a3b8;">INTERNATIONAL CARD</span>
                <span style="font-weight:bold; font-style:italic;">VISA</span>
            </div>
            <div class="chip"></div>
            <div class="card-number">4512 8820 1122 3456</div>
            <p style="font-size:12px; margin-top:10px; color:#94a3b8;">VALID THRU: 03/30</p>
        </div>
        <div class="balance-box">
            <p>বর্তমান ব্যালেন্স</p>
            <h2 id="balance">$0.00</h2>
        </div>
    </div>

    <script>
        let count = 0;
        function startSpin() {
            count++;
            const wheel = document.getElementById('wheel');
            const btn = document.getElementById('spinBtn');
            const msg = document.getElementById('msg');

            if (count === 1) {
                wheel.style.transform = "rotate(3660deg)"; // $0 এর ঘরে
                btn.disabled = true;
                setTimeout(() => {
                    msg.innerHTML = "দুঃখিত! $0 পেয়েছেন। <br><b>আরেকবার চেষ্টা করুন!</b>";
                    btn.disabled = false;
                }, 4000);
            } else if (count === 2) {
                wheel.style.transform = "rotate(7320deg)"; // $50 এর ঘরে
                btn.disabled = true;
                setTimeout(() => {
                    msg.innerHTML = "<b style='color:#10b981'>আপনি $50 বোনাস পেয়েছেন!</b>";
                    btn.innerText = "ওয়ালেটে দেখুন";
                    btn.disabled = false;
                    btn.onclick = function() {
                        document.getElementById('game-page').classList.add('hidden');
                        document.getElementById('wallet-page').classList.remove('hidden');
                        let b = 0;
                        let interval = setInterval(() => {
                            if(b >= 50) clearInterval(interval);
                            document.getElementById('balance').innerText = "$" + b.toFixed(2);
                            b++;
                        }, 50);
                    };
                }, 4000);
            }
        }
    </script>
</body>
</html>
