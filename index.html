<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>International Reward Card</title>
    <style>
        /* CSS অংশ - স্টাইল এবং ডিজাইন */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: #0f172a; 
            color: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden;
            text-align: center;
        }

        .page {
            position: absolute;
            width: 90%;
            max-width: 400px;
            transition: all 0.5s ease-in-out;
        }

        /* স্পিন হুইল ডিজাইন */
        .wheel-container { position: relative; width: 280px; height: 280px; margin: 30px auto; }
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 8px solid #334155; position: relative; 
            overflow: hidden; 
            transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1); 
        }
        .segment { 
            position: absolute; width: 50%; height: 50%; 
            background: var(--color); transform-origin: bottom right; 
            transform: rotate(calc(60deg * var(--i))); 
            display: flex; justify-content: center; align-items: center; 
            border: 1px solid rgba(0,0,0,0.1); 
        }
        .segment span { transform: rotate(-45deg); font-weight: bold; font-size: 14px; }
        .arrow { 
            position: absolute; top: -15px; left: 50%; 
            transform: translateX(-50%); width: 0; height: 0; 
            border-left: 15px solid transparent; border-right: 15px solid transparent; 
            border-top: 25px solid #ef4444; z-index: 10; 
        }

        button { 
            padding: 15px 30px; font-size: 18px; cursor: pointer; 
            background: #3b82f6; color: #fff; border: none; 
            border-radius: 12px; margin-top: 20px; font-weight: bold; 
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        button:disabled { background: #475569; cursor: not-allowed; }

        /* কার্ড ডিজাইন */
        .card-front {
            background: linear-gradient(135deg, #1e293b 0%, #000000 100%);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: left;
            margin-top: 20px;
        }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .card-logo { width: 50px; filter: brightness(10); }
        .chip { width: 45px; height: 32px; background: linear-gradient(135deg, #fbbf24, #d97706); border-radius: 6px; margin: 25px 0; }
        .card-number { font-size: 20px; letter-spacing: 3px; font-family: 'Courier New', monospace; margin-bottom: 15px; color: #e2e8f0; }
        .label { font-size: 9px; color: #94a3b8; display: block; margin-bottom: 2px; }
        .value { font-size: 14px; color: #f8fafc; font-weight: 500; }

        .balance-box { 
            background: #1e293b; padding: 20px; border-radius: 15px; 
            margin-top: 30px; border: 1px solid #334155; 
        }
        .balance-box h2 { color: #22c55e; font-size: 35px; margin-top: 5px; }

        /* লুকানোর জন্য ক্লাস */
        .hidden { display: none; opacity: 0; transform: scale(0.9); }
    </style>
</head>
<body>

    <div id="game-layer" class="page">
        <h1 id="title">আপনার ভাগ্য পরীক্ষা করুন</h1>
        <div class="wheel-container">
            <div id="wheel" class="wheel">
                <div class="segment" style="--i:1;--color:#ef4444;"><span>$0</span></div>
                <div class="segment" style="--i:2;--color:#3b82f6;"><span>$10</span></div>
                <div class="segment" style="--i:3;--color:#10b981;"><span>$50</span></div>
                <div class="segment" style="--i:4;--color:#f59e0b;"><span>$5</span></div>
                <div class="segment" style="--i:5;--color:#8b5cf6;"><span>$0</span></div>
                <div class="segment" style="--i:6;--color:#f97316;"><span>$100</span></div>
            </div>
            <div class="arrow"></div>
        </div>
        <button id="spinBtn" onclick="handleSpin()">স্পিন করুন</button>
        <p id="status-msg" style="margin-top: 15px; color: #94a3b8;"></p>
    </div>

    <div id="wallet-layer" class="page hidden">
        <h1>অভিনন্দন!</h1>
        <div class="card-front">
            <div class="card-header">
                <span style="font-size: 12px; letter-spacing: 1px; color: #94a3b8;">INTERNATIONAL PREPAID</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa" class="card-logo">
            </div>
            <div class="chip"></div>
            <div class="card-number">4512 8820 1122 3456</div>
            <div class="card-details">
                <div class="detail-item">
                    <span class="label">VALID THRU</span>
                    <span class="value">03/30</span>
                </div>
            </div>
        </div>
        <div class="balance-box">
            <p style="color: #94a3b8;">আপনার ওয়ালেট ব্যালেন্স</p>
            <h2 id="balance-display">$0.00</h2>
        </div>
    </div>

    <script>
        // JavaScript অংশ - লজিক
        let spinCount = 0;
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const statusMsg = document.getElementById('status-msg');

        function handleSpin() {
            spinCount++;
            spinBtn.disabled = true;

            if (spinCount === 1) {
                // ১ম বার স্পিন: $0 তে থামবে
                wheel.style.transform = "rotate(3660deg)"; 
                setTimeout(() => {
                    statusMsg.innerHTML = "দুঃখিত! আপনি $0 পেয়েছেন। <br><b style='color:#fff'>আরেকবার সুযোগ আছে, ক্লিক করুন!</b>";
                    spinBtn.innerText = "আবার চেষ্টা করুন";
                    spinBtn.disabled = false;
                }, 4100);
            } 
            else if (spinCount === 2) {
                // ২য় বার স্পিন: $50 তে থামবে
                wheel.style.transform = "rotate(7320deg)"; 
                setTimeout(() => {
                    statusMsg.innerHTML = "<b style='color:#10b981; font-size:18px;'>আপনি $50 বোনাস পেয়েছেন!</b>";
                    spinBtn.innerText = "ওয়ালেটে টাকা জমা দিন";
                    spinBtn.style.background = "#10b981";
                    spinBtn.disabled = false;
                    // ৩য় ক্লিকের জন্য ফাংশন পরিবর্তন
                    spinBtn.onclick = showWallet;
                }, 4100);
            }
        }

        function showWallet() {
            // গেম লেয়ার লুকিয়ে কার্ড লেয়ার দেখানো
            document.getElementById('game-layer').classList.add('hidden');
            
            setTimeout(() => {
                document.getElementById('game-layer').style.display = 'none';
                const walletLayer = document.getElementById('wallet-layer');
                walletLayer.classList.remove('hidden');
                
                // ব্যালেন্স কাউন্টার এনিমেশন
                let currentBalance = 0;
                let target = 50;
                let counter = setInterval(() => {
                    if (currentBalance >= target) {
                        clearInterval(counter);
                        document.getElementById('balance-display').innerText = "$50.00";
                    } else {
                        currentBalance++;
                        document.getElementById('balance-display').innerText = "$" + currentBalance.toFixed(2);
                    }
                }, 40);
            }, 500);
        }
    </script>
</body>
</html>
