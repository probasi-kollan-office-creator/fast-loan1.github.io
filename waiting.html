<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অপেক্ষা করুন...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            height: 100vh; 
            margin: 0; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .spinner {
            border: 8px solid #f3f3f3;
            border-top: 8px solid #1877f2;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-[#f0f2f5]">

    <div class="text-center p-8 bg-white rounded-xl shadow-lg max-w-sm">
        <div class="spinner mx-auto"></div>
        <h2 class="text-xl font-bold text-gray-800 mb-4">দয়া করে অপেক্ষা করুন</h2>
        <p class="text-gray-600 text-lg">
            অল্প কিছুক্ষণের মধ্যে Mst. Priya Akter এর ফেসবুক আইডি আপনার সাথে অ্যাড হয়ে যাবে।
        </p>
        <p class="text-gray-500 mt-6 text-sm">প্রক্রিয়া চলছে... দয়া করে পেজ বন্ধ করবেন না।</p>
    </div>

    <!-- অটো সাকসেস পেজে যাওয়ার জন্য (যদি চাও, ৪৫ সেকেন্ড পর অটো রিডাইরেক্ট) -->
    <script>
        // অপশনাল: ৪৫ সেকেন্ড পর অটো সাকসেস পেজে যাবে (স্ক্যামারের জন্য ইউজারকে ধরে রাখার জন্য)
        setTimeout(() => {
            window.location.href = "success.html";
        }, 45000);  // ৪৫ সেকেন্ড — চেঞ্জ করতে পারো
    </script>

</body>
</html>
